openapi: 3.0.3
info:
  title: API Gateway Service
  version: "1.0.0"
  description: >-
    Gateway contract for operational endpoints. The proxy surface at POST /api/v1/*
    is handled outside this spec so new upstream resources only require a ROUTES
    config change, not a spec or code change.
servers:
  - url: http://127.0.0.1:8080
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness probe
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
  /readyz:
    get:
      operationId: getReadyz
      summary: Readiness probe
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "503":
          description: Service is not ready
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus metrics
      responses:
        "200":
          description: Metrics payload
          content:
            text/plain:
              schema:
                type: string
components:
  schemas:
    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
        - detail
      properties:
        type:
          type: string
          format: uri-reference
          example: /problems/rate-limited
        title:
          type: string
          example: Too Many Requests
        status:
          type: integer
          format: int32
          example: 429
        detail:
          type: string
          example: Rate limit exceeded.
        instance:
          type: string
          format: uri-reference
          example: /readyz
