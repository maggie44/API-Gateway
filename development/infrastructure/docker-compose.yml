services:
  redis:
    image: redis:8.6.1-alpine
    container_name: api-gateway-redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 1s
      retries: 5
      start_period: 2s

  users-backend:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: mock-backend
    environment:
      SERVICE_NAME: users
      LISTEN_ADDRESS: ':8081'
    ports:
      - '${USERS_BACKEND_PORT:-8081}:8081'

  products-backend:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: mock-backend
    environment:
      SERVICE_NAME: products
      LISTEN_ADDRESS: ':8082'
    ports:
      - '${PRODUCTS_BACKEND_PORT:-8082}:8082'
