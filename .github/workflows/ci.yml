name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: go-ci-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run lint
        run: make lint

      - name: Run unit tests
        run: make test
